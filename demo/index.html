<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Display Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f0e8;
      color: #333;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { color: #333; margin-bottom: 1rem; }
    #toolbar {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    #animations {
      display: flex;
      gap: 0.5rem;
    }
    #animations button {
      background: #fff;
      color: #333;
      border: 1px solid #333;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    #animations button.active {
      background: #333;
      color: #fff;
    }
    #animations button:hover {
      background: #333;
      color: #fff;
    }
    #settings {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    #settings label {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      font-size: 0.75rem;
      color: #666;
    }
    #settings input[type="range"] {
      width: 60px;
      accent-color: #333;
    }
    #settings select {
      background: #fff;
      color: #333;
      border: 1px solid #333;
      padding: 0.2rem 0.4rem;
      font-family: monospace;
      font-size: 0.8rem;
    }
    .value {
      color: #333;
      min-width: 2ch;
      text-align: right;
    }
    #display {
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>Voxel Display</h1>
  <a href="https://github.com/mberg/voxel-display" target="_blank" style="position:fixed;bottom:1rem;right:1rem;color:#000;"><svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
  <div id="toolbar">
    <div id="settings">
      <label>
        Pixel Size <input type="range" id="pixel-size" min="2" max="40" value="20">
        <span class="value" id="pixel-size-val">20</span>
      </label>
      <label>
        Extrude <input type="range" id="distance" min="0" max="50" value="20">
        <span class="value" id="distance-val">20</span>
      </label>
      <label>
        Depth <input type="range" id="depth" min="0" max="5" value="1">
        <span class="value" id="depth-val">1</span>
      </label>
      <label>
        FPS <input type="range" id="fps" min="1" max="30" value="10">
        <span class="value" id="fps-val">10</span>
      </label>
      <label>
        Angle <input type="range" id="angle" min="0" max="360" value="6">
        <span class="value" id="angle-val">6</span>
      </label>
      <label id="pitch-label">
        Pitch <input type="range" id="pitch" min="0" max="90" value="60">
        <span class="value" id="pitch-val">60</span>
      </label>
      <label>
        Opacity <input type="range" id="opacity" min="0" max="100" value="100">
        <span class="value" id="opacity-val">100</span>
      </label>
      <label>
        Color <input type="color" id="active-color" value="#f09719">
      </label>
      <label>
        BG <input type="color" id="bg-color" value="#fbf4ea">
      </label>
<label>
        Camera
        <select id="camera-type">
          <option value="oblique">Oblique</option>
          <option value="isometric">Isometric</option>
          <option value="orthographic" selected>Orthographic</option>
        </select>
      </label>
    </div>
  </div>
  <div id="display"></div>
  <div id="animations" style="margin-top:0.5rem;">
    <button data-anim="wave" class="active">Wave</button>
    <button data-anim="matrix">Matrix</button>
    <button data-anim="text">Scrolling Text</button>
    <button data-anim="world">World Map</button>
    <button data-anim="eq">EQ</button>
    <button data-anim="remote">Tidbyt</button>
  </div>
  <p style="margin-top:0.5rem; font-size:0.8rem; color:#999;">64x32 Voxel Display (Tidbyt compatible)</p>
  <div id="remote-row" style="display:none; margin-top:1rem;">
    <label style="font-size:0.9rem; color:#666;">
      URL <input type="text" id="remote-url" value="https://pixlet-production.up.railway.app/api/v1/preview.webp" style="font-family:monospace; font-size:0.9rem; padding:0.3rem 0.5rem; border:1px solid #333; background:#fff; color:#333; width:20rem;">
    </label>
    <button id="remote-connect" style="background:#fff; color:#333; border:1px solid #333; padding:0.3rem 0.8rem; cursor:pointer; font-family:monospace; font-size:0.9rem; margin-left:0.5rem;">Connect</button>
  </div>
  <div id="text-input-row" style="display:none; margin-top:1rem;">
    <label style="font-size:0.9rem; color:#666;">
      Text <input type="text" id="scroll-text" value="Hey Buddy!" style="font-family:monospace; font-size:0.9rem; padding:0.3rem 0.5rem; border:1px solid #333; background:#fff; color:#333; width:20rem;">
    </label>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
