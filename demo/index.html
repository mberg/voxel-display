<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Display Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { color: #00ff41; margin-bottom: 1rem; }
    #controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    #controls button {
      background: #1a1a2e;
      color: #00ff41;
      border: 1px solid #00ff41;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.9rem;
    }
    #controls button.active {
      background: #00ff41;
      color: #0a0a1a;
    }
    #controls button:hover {
      background: #00ff41;
      color: #0a0a1a;
    }
    #display {
      max-width: 100%;
      overflow: auto;
    }
    #display svg {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Voxel Display</h1>
  <div id="controls">
    <button data-anim="wave" class="active">Wave</button>
    <button data-anim="sparkle">Sparkle</button>
    <button data-anim="text">Scrolling Text</button>
  </div>
  <div id="display"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
